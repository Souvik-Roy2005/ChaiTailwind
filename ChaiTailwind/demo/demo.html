<!DOCTYPE html>
<html>
<head>
  <title>Demo</title>
</head>
<body>

  <button onclick="addBox()">Add Box</button>

  <script type="module">
    import "../src/engine.js";

    window.addBox = () => {
      const div = document.createElement("div");
      div.className = "chai-p-20 chai-bg-pink chai-m-10 chai-rounded-8";
      div.innerText = "Dynamically added!";
      document.body.appendChild(div);
    };
  </script>

</body>
</html>
